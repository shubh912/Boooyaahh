      <stop offset="0%" style="stop-color:#FAF6EF"/>
      <stop offset="100%" style="stop-color:#E8C4A8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="630" fill="#C05C2E"/>
  <!-- Brand -->
  <text x="80" y="220" font-family="Georgia,serif" font-size="88" font-weight="bold" fill="#1A1209">Art</text>
  <text x="255" y="220" font-family="Georgia,serif" font-size="88" font-style="italic" fill="#C05C2E">&amp;</text>
  <text x="320" y="220" font-family="Georgia,serif" font-size="88" font-weight="bold" fill="#1A1209">Beyond</text>
